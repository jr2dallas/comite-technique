<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comité Technique — 3D Coin</title>
<style>
  :root {
    /* =============================================
       COULEURS DE LA BORDURE — MODIFIE ICI
       Gris-vert métallique, comme la bordure de l'image
       ============================================= */
    --edge-light:  #686c60;   /* strie claire (gris-vert clair) */
    --edge-dark:   #1a1e14;   /* strie sombre (gris-vert foncé) */
    --edge-mid:    #3a3f34;   /* ton moyen */
    --edge-shadow: rgba(0,0,0,0.5);
    --ridges: 120;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    overflow: hidden;
    font-family: sans-serif;
  }
  .glow {
    position: absolute;
    width: 420px; height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(50,120,50,0.25) 0%, transparent 70%);
    filter: blur(40px);
    animation: glowPulse 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  .scene {
    width: 380px; height: 380px;
    perspective: 900px;
    cursor: grab;
  }
  .scene:active { cursor: grabbing; }
  .coin {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: spin 5s linear infinite;
  }
  @keyframes spin {
    0%   { transform: rotateY(0deg)   rotateX(8deg); }
    100% { transform: rotateY(360deg) rotateX(8deg); }
  }
  .coin-face {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    backface-visibility: hidden;
    overflow: hidden;
    background: #111;
  }
  .coin-face.front { transform: translateZ(14px); }
  .coin-face.back  { transform: rotateY(180deg) translateZ(14px); }
  .coin-face img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }
  .coin-face.back img { filter: brightness(0.75) sepia(0.2); }
  .coin-edge {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: transparent;
    box-sizing: border-box;
    pointer-events: none;
  }
  .coin-face::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%, rgba(0,0,0,0.2) 100%);
    pointer-events: none;
  }
  .controls {
    position: fixed; bottom: 24px;
    display: flex; gap: 12px; z-index: 10;
  }
  .controls button {
    padding: 8px 20px;
    background: rgba(80,85,74,0.3);
    color: #a0a590;
    border: 1px solid rgba(100,110,90,0.4);
    border-radius: 6px; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .controls button:hover { background: rgba(100,110,90,0.5); color: #c0c8b0; }
  .controls button.active { background: rgba(100,110,90,0.6); color: #d8e0c8; border-color: rgba(130,140,110,0.8); }
  .reflection {
    width: 300px; height: 60px; margin-top: 20px;
    background: radial-gradient(ellipse, rgba(80,90,70,0.15) 0%, transparent 70%);
    border-radius: 50%; filter: blur(6px);
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="scene" id="scene">
  <div class="coin" id="coin">
    <div class="coin-face front">
      <img id="imgFront" alt="Comité Technique">
    </div>
    <div class="coin-face back">
      <img id="imgBack" alt="Comité Technique — Back">
    </div>
  </div>
</div>
<div class="reflection"></div>
<div class="controls" style="display:none">
  <button id="btnSlow">Lent</button>
  <button id="btnNormal" class="active">Normal</button>
  <button id="btnFast">Rapide</button>
  <button id="btnDrag">Glisser</button>
</div>

  document.getElementById('imgFront').src = COIN_IMG;
  document.getElementById('imgBack').src = COIN_IMG;

  const coin = document.getElementById('coin');
  const scene = document.getElementById('scene');
  const styles = getComputedStyle(document.documentElement);
  const edgeLight  = styles.getPropertyValue('--edge-light').trim();
  const edgeDark   = styles.getPropertyValue('--edge-dark').trim();
  const ridges     = parseInt(styles.getPropertyValue('--ridges')) || 120;

  const HALF = 12;
  const SLICES = 60;
  const BORDER_WIDTH = 14;

  // Conic gradient for knurled ridges
  function buildKnurlGradient() {
    const steps = [];
    const segDeg = 360 / ridges;
    for (let i = 0; i < ridges; i++) {
      const a1 = (segDeg * i).toFixed(2);
      const a2 = (segDeg * i + segDeg * 0.35).toFixed(2);
      const a3 = (segDeg * i + segDeg * 0.5).toFixed(2);
      const a4 = (segDeg * (i + 1)).toFixed(2);
      steps.push(`${edgeDark} ${a1}deg`);
      steps.push(`${edgeLight} ${a2}deg`);
      steps.push(`${edgeLight} ${a3}deg`);
      steps.push(`${edgeDark} ${a4}deg`);
    }
    return `conic-gradient(${steps.join(', ')})`;
  }

  const knurlGradient = buildKnurlGradient();

  const fragment = document.createDocumentFragment();
  for (let i = 0; i <= SLICES; i++) {
    const z = -HALF + (2 * HALF / SLICES) * i;
    const el = document.createElement('div');
    el.className = 'coin-edge';
    const t = i / SLICES;
    const intensity = Math.sin(t * Math.PI);
    const opacity = 0.6 + intensity * 0.4;

    el.style.cssText = `
      transform: translateZ(${z.toFixed(2)}px);
      border: ${BORDER_WIDTH}px solid transparent;
      background:
        linear-gradient(transparent, transparent) padding-box,
        ${knurlGradient} border-box;
      opacity: ${opacity.toFixed(2)};
      box-shadow: inset 0 0 6px ${edgeDark};
    `;
    fragment.appendChild(el);
  }
  const backFace = coin.querySelector('.coin-face.back');
  coin.insertBefore(fragment, backFace);

  const speeds = { slow: '10s', normal: '5s', fast: '1.8s' };
  const buttons = {
    slow: document.getElementById('btnSlow'),
    normal: document.getElementById('btnNormal'),
    fast: document.getElementById('btnFast'),
  };
  let autoRotate = true, currentSpeed = 'normal';

  function setSpeed(key) {
    currentSpeed = key;
    coin.style.animationDuration = speeds[key];
    Object.values(buttons).forEach(b => b.classList.remove('active'));
    buttons[key].classList.add('active');
    if (!autoRotate) {
      autoRotate = true;
      coin.style.animation = `spin ${speeds[currentSpeed]} linear infinite`;
      document.getElementById('btnDrag').classList.remove('active');
    }
  }
  buttons.slow.addEventListener('click', () => setSpeed('slow'));
  buttons.normal.addEventListener('click', () => setSpeed('normal'));
  buttons.fast.addEventListener('click', () => setSpeed('fast'));

  const btnDrag = document.getElementById('btnDrag');
  let isDragging = false, dragStartX = 0, dragStartY = 0, rotY = 0, rotX = 8;

  btnDrag.addEventListener('click', () => {
    autoRotate = !autoRotate;
    if (autoRotate) {
      coin.style.animation = `spin ${speeds[currentSpeed]} linear infinite`;
      coin.style.transform = '';
      btnDrag.classList.remove('active');
      buttons[currentSpeed].classList.add('active');
    } else {
      coin.style.animation = 'none';
      coin.style.transform = getComputedStyle(coin).transform;
      btnDrag.classList.add('active');
      Object.values(buttons).forEach(b => b.classList.remove('active'));
    }
  });

  scene.addEventListener('mousedown', e => {
    if (autoRotate) return;
    isDragging = true; dragStartX = e.clientX; dragStartY = e.clientY;
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotY += (e.clientX - dragStartX) * 0.6;
    rotX -= (e.clientY - dragStartY) * 0.3;
    rotX = Math.max(-40, Math.min(40, rotX));
    coin.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;
    dragStartX = e.clientX; dragStartY = e.clientY;
  });
  window.addEventListener('mouseup', () => { isDragging = false; });

  scene.addEventListener('touchstart', e => {
    if (autoRotate) return;
    isDragging = true; dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
  }, { passive: true });
  window.addEventListener('touchmove', e => {
    if (!isDragging) return;
    rotY += (e.touches[0].clientX - dragStartX) * 0.6;
    rotX -= (e.touches[0].clientY - dragStartY) * 0.3;
    rotX = Math.max(-40, Math.min(40, rotX));
    coin.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;
    dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
  }, { passive: true });
  window.addEventListener('touchend', () => { isDragging = false; });
</script>
